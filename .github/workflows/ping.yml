name: API Request Every 14 Minutes

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  run_api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python main.py
